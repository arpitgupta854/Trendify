    <style>
      /* Add your scrollbar styles here */
      body {
        overflow-x: hidden;
        width: 100%;
        box-sizing: border-box;
      }


      ::-webkit-scrollbar {
        width: 10px; 
        height: 10px; 
      }

    
      ::-webkit-scrollbar-track {
        background: #f1f1f1;
        border-radius: 10px;
      }

     
      ::-webkit-scrollbar-thumb {
        background: #888; 
        border-radius: 10px; 
      }

    
      ::-webkit-scrollbar-thumb:hover {
        background: #555; 
      }
      .cursor{
    position: fixed;
    width: 50px;
    height: 50px;
    border: 2px solid rgb(4, 0, 248);
    border-radius: 50%;
    pointer-events: none;
    margin-top: -25px;
    margin-left: -22px;
    text-align: center;
    transition: transform 0.1s ease-out;
   
}
.cursor2{
    position: fixed;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background-color: #f95711;
    text-align: center;
    transition: transform 0.1s ease-out;
}
    </style>
